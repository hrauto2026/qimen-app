        function getStatusClass(text) {
            if (text.includes("(吉)")) return "status-ji";
            if (text.includes("(凶)")) return "status-xiong";
            if (text.includes("(平)")) return "status-ping";
            return "";
        }

        function getShortName(text) {
            // 找到第一個出現括號、書名號或句號前的文字
            let name = text.split(/[ \(《。\(]/)[0].trim();
            let rating = "";
            if (text.includes("(吉)")) rating = " [吉]";
            else if (text.includes("(凶)")) rating = " [凶]";
            else if (text.includes("(平)")) rating = " [平]";
            return name + rating;
        }

        function init() {
            const container = document.getElementById('content-container');
            
            // 1. 生成矩陣
            const qiyiSection = createSection("十干克應矩陣");
            const matrixWrapper = document.createElement('div');
            matrixWrapper.className = 'matrix-container';
            
            let tableHtml = `<table class="matrix-table">
                <thead>
                    <tr>
                        <th class="w-16 bg-indigo-50 text-indigo-700">天盤➡️<br> ⬇️地盤</th>`;
            stems.forEach(s => tableHtml += `<th>${s}</th>`);
            tableHtml += `</tr></thead><tbody>`;
            
            matrixData.forEach((row, i) => {
                tableHtml += `<tr><th class="bg-slate-50 text-xl font-bold">${stems[i]}</th>`;
                row.forEach((fullDesc) => {
                    const statusClass = getStatusClass(fullDesc);
                    const shortName = getShortName(fullDesc);
                    tableHtml += `<td class="${statusClass}" onclick="showBubble('${shortName}', \`${fullDesc.replace(/`/g, '\\`').replace(/'/g, "\\'")}\`)">${shortName}</td>`;
                });
                tableHtml += `</tr>`;
            });
            tableHtml += `</tbody></table>`;
            matrixWrapper.innerHTML = tableHtml;
            qiyiSection.appendChild(matrixWrapper);
            container.appendChild(qiyiSection);

            // 2. 生成其他分類
            const categories = [...new Set(otherData.map(d => d.category))];
            categories.forEach(cat => {
                const section = createSection(cat);
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4';
                otherData.filter(d => d.category === cat).forEach(item => {
                    grid.appendChild(createBtn(item));
                });
                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        function createSection(titleText) {
            const sec = document.createElement('section');
            sec.className = 'bg-white rounded-2xl shadow-sm p-6 md:p-8 border border-gray-100';
            sec.innerHTML = `<h2 class="text-2xl font-bold text-gray-800 mb-6 border-l-4 border-indigo-500 pl-4">${titleText}</h2>`;
            return sec;
        }

        function createBtn(item) {
            const btn = document.createElement('button');
            let colors = item.type === '吉' ? 'bg-green-50 text-green-700 border-green-500 hover:bg-green-600 hover:text-white' : 
                         item.type === '凶' ? 'bg-red-50 text-red-700 border-red-500 hover:bg-red-600 hover:text-white' :
                         'bg-slate-50 text-slate-700 border-slate-500 hover:bg-slate-600 hover:text-white';
            btn.className = `grid-btn font-medium py-4 px-4 rounded-xl text-center text-lg ${colors}`;
            btn.innerHTML = item.name;
            btn.onclick = () => showBubble(item.name, item.desc);
            return btn;
        }

        function showBubble(name, desc) {
            const modal = document.getElementById('bubble-modal');
            const title = document.getElementById('bubble-title');
            const content = document.getElementById('bubble-desc');
            
            title.innerHTML = name.split(' [')[0];
            
            // 如果描述是 HTML 表格，直接顯示；如果是純文字，按分號換行
            if (desc.includes('<table')) {
                content.innerHTML = desc;
            } else {
                content.innerHTML = desc.split('；').map(p => `<div>${p}</div>`).join('');
            }
            
            // 標題顏色判定
            if (desc.includes("(吉)")) title.className = "text-3xl font-bold mb-4 border-b-2 pb-2 text-green-600 border-green-100";
            else if (desc.includes("(凶)")) title.className = "text-3xl font-bold mb-4 border-b-2 pb-2 text-red-600 border-red-100";
            else title.className = "text-3xl font-bold mb-4 border-b-2 pb-2 text-indigo-600 border-indigo-100";
            
            modal.classList.remove('hidden');
        }

        document.getElementById('close-btn').onclick = () => document.getElementById('bubble-modal').classList.add('hidden');
        window.onclick = (e) => { if(e.target.id === 'bubble-modal') document.getElementById('bubble-modal').classList.add('hidden'); }

        init();
    </script>
